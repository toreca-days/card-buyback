<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買取価格検索 | トレカデイズ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #fdf6ee; min-height: 100vh; color: #2a1a0e; }

    .header {
      background: #f26a00;
      padding: 20px 40px 16px;
      display: flex; align-items: center;
      border-bottom: 3px solid #c45200;
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display: flex; flex-direction: column; gap: 3px; }
    .header-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 6px;
      line-height: 1;
    }
    .header-sub { font-size: 10px; color: rgba(255,255,255,0.65); letter-spacing: 3px; font-weight: 300; margin-top: 4px; }
    .badge {
      margin-left: auto;
      background: #fff;
      color: #f26a00;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 2px;
      letter-spacing: 2px;
    }

    .search-area {
      background: #fff;
      border-bottom: 2px solid #f5dfc8;
      padding: 18px 40px;
      position: sticky; top: 70px; z-index: 99;
      box-shadow: 0 4px 16px rgba(242,106,0,0.07);
    }
    .search-row { display: flex; align-items: center; gap: 20px; max-width: 960px; margin: 0 auto; }
    .updated-at { font-size: 10px; color: #c8a070; white-space: nowrap; line-height: 1.8; min-width: 72px; letter-spacing: 0.5px; }
    .updated-at b { color: #f26a00; font-size: 11px; display: block; font-weight: 500; }
    .search-wrap { flex: 1; position: relative; }
    .search-input {
      width: 100%; height: 48px; padding: 0 52px 0 20px;
      border: 1.5px solid #f5c8a0; border-radius: 4px;
      font-size: 14px; font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
      background: #fffaf6; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; color: #2a1a0e;
      letter-spacing: 0.5px;
    }
    .search-input:focus { border-color: #f26a00; box-shadow: 0 0 0 3px rgba(242,106,0,0.1); background: #fff; }
    .search-input::placeholder { color: #d4b090; font-weight: 300; }
    .search-ico { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: #f26a00; opacity: 0.5; pointer-events: none; }

    .status-bar { max-width: 1280px; margin: 0 auto; padding: 12px 40px 4px; font-size: 11px; color: #c8a070; min-height: 32px; letter-spacing: 0.5px; }
    .status-bar b { color: #f26a00; font-weight: 500; }

    .results { max-width: 1280px; margin: 0 auto; padding: 8px 32px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }

    .card {
      background: #fff;
      border: 1px solid #f0dcc8;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #f26a00, #ffaa50, #f26a00);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover { border-color: #f26a00; transform: translateY(-4px); box-shadow: 0 12px 32px rgba(242,106,0,0.12); }
    .card:hover::after { opacity: 1; }

    .card-body { padding: 16px 16px 18px; }
    .card-number {
      font-size: 9px; color: #fff; background: #f26a00;
      display: inline-block; padding: 3px 9px; border-radius: 2px;
      margin-bottom: 10px; letter-spacing: 1px; font-family: monospace;
    }
    .card-name { font-size: 13px; font-weight: 400; color: #2a1a0e; margin-bottom: 14px; line-height: 1.65; min-height: 42px; letter-spacing: 0.3px; }

    .divider { height: 1px; background: linear-gradient(90deg, transparent, #f0dcc8, transparent); margin-bottom: 14px; }

    .price-box { display: flex; align-items: baseline; justify-content: space-between; }
    .price-label { font-size: 10px; color: #c8a070; font-weight: 300; letter-spacing: 1.5px; }
    .price-value { font-size: 22px; font-weight: 700; color: #f26a00; line-height: 1; }
    .price-yen { font-size: 13px; margin-right: 2px; font-weight: 500; }
    .price-none { font-size: 14px; color: #ddd; font-weight: 300; }

    .idle-msg { grid-column: 1/-1; text-align: center; padding: 100px 20px 80px; }
    .idle-icon { width: 56px; height: 56px; display: block; margin: 0 auto 20px; opacity: 0.25; }
    .idle-msg p { font-size: 13px; color: #c8a070; font-weight: 300; letter-spacing: 2px; }

    .loading { grid-column: 1/-1; text-align: center; padding: 100px 20px; color: #c8a070; font-size: 12px; letter-spacing: 2px; font-weight: 300; }
    .spinner { width: 32px; height: 32px; border: 1.5px solid #f5dfc8; border-top-color: #f26a00; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { grid-column: 1/-1; background: #fff8f2; border: 1px solid #f5dfc8; border-radius: 4px; padding: 24px 28px; margin: 8px; font-size: 13px; color: #c45200; line-height: 2; font-weight: 300; }
    .empty { grid-column: 1/-1; text-align: center; padding: 100px 20px; color: #c8a070; font-size: 13px; letter-spacing: 2px; font-weight: 300; }

    .more-wrap { grid-column: 1/-1; text-align: center; padding: 16px 0 24px; }
    .more-btn { background: transparent; color: #f26a00; border: 1.5px solid #f26a00; padding: 12px 40px; border-radius: 3px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; cursor: pointer; letter-spacing: 2px; transition: background 0.2s, color 0.2s; }
    .more-btn:hover { background: #f26a00; color: #fff; }

    mark { background: rgba(242,106,0,0.12); color: #c45200; border-radius: 2px; padding: 0 1px; }

    @media (max-width: 600px) {
      .header { padding: 16px 20px; }
      .header-title { font-size: 20px; letter-spacing: 4px; }
      .search-area { padding: 14px 20px; top: 62px; }
      .status-bar { padding: 10px 20px 4px; }
      .results { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 8px 12px 40px; }
      .updated-at { display: none; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo">
      <div class="header-title">トレカデイズ</div>
      <div class="header-sub">CARD BUYBACK SEARCH</div>
    </div>
    <div class="badge">買 取 中</div>
  </div>

  <div class="search-area">
    <div class="search-row">
      <div class="updated-at" id="updated-at"></div>
      <div class="search-wrap">
        <input class="search-input" id="q" type="text"
          placeholder="カード名・型番で検索　例：ピカチュウ　007/025"
          oninput="doSearch()">
        <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status"></div>
  <div class="results" id="results">
    <div class="loading"><div class="spinner"></div>読み込み中...</div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyeXnFTFKZjGoeKRbDGq6pBhLJDa_9qyHpID2uSl6fHK37VJngWX7wRhklG1eJ0Zdi1/exec';

    let allCards = [];
    let filtered = [];
    let displayCount = 100;
    let dataLoaded = false;

    function formatPrice(str) {
      if (!str || str === 'null' || str === '') return null;
      const n = parseInt(String(str).replace(/[^0-9]/g, ''));
      if (isNaN(n) || n === 0) return null;
      return n.toLocaleString();
    }

    function highlight(text, q) {
      if (!q) return text;
      const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp('(' + esc + ')', 'gi'), '<mark>$1</mark>');
    }

    function showIdle() {
      document.getElementById('status').innerHTML = '全 <b>' + allCards.length.toLocaleString() + '</b> 件 読み込み済み';
      document.getElementById('results').innerHTML =
        '<div class="idle-msg">' +
        '<svg class="idle-icon" viewBox="0 0 24 24" fill="none" stroke="#f26a00" stroke-width="1">' +
        '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
        '<p>カード名や型番を入力して検索してください</p></div>';
    }

    async function loadData() {
      try {
        const res = await fetch(GAS_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        let json;
        try { json = JSON.parse(text); } catch(e) { throw new Error('JSONパースエラー: ' + text.slice(0, 100)); }

        const upEl = document.getElementById('updated-at');
        if (json && json.updatedAt) {
          upEl.innerHTML = '更新日<b>' + json.updatedAt + '</b>';
        } else {
          upEl.textContent = '';
        }

        const cards = Array.isArray(json) ? json : (json.cards || []);
        allCards = cards
          .map(function(r) {
            return { name: String(r.name || '').trim(), price: formatPrice(r.price), number: String(r.number || '').trim() };
          })
          .filter(function(c) { return c.name; });

        dataLoaded = true;
        showIdle();
      } catch(e) {
        document.getElementById('results').innerHTML = '<div class="error-msg">読み込みに失敗しました。<br>エラー: ' + e.message + '</div>';
        document.getElementById('status').textContent = '';
      }
    }

    function doSearch() {
      if (!dataLoaded) return;
      const q = document.getElementById('q').value.toLowerCase().trim();
      displayCount = 100;
      if (!q) { showIdle(); return; }
      filtered = allCards.filter(function(c) {
        return c.name.toLowerCase().includes(q) || c.number.toLowerCase().includes(q);
      });
      document.getElementById('status').innerHTML = '"' + q + '" の検索結果：<b>' + filtered.length.toLocaleString() + '</b> 件';
      renderCards(q);
    }

    function renderCards(q) {
      const el = document.getElementById('results');
      if (!filtered.length) { el.innerHTML = '<div class="empty">該当するカードが見つかりませんでした</div>'; return; }
      const slice = filtered.slice(0, displayCount);
      el.innerHTML = slice.map(function(c) {
        return '<div class="card"><div class="card-body">' +
          (c.number ? '<div class="card-number">' + highlight(c.number, q) + '</div>' : '') +
          '<div class="card-name">' + highlight(c.name, q) + '</div>' +
          '<div class="divider"></div>' +
          '<div class="price-box"><div class="price-label">買 取 価 格</div>' +
          '<div class="price-value">' +
          (c.price ? '<span class="price-yen">¥</span>' + c.price : '<span class="price-none">—</span>') +
          '</div></div></div></div>';
      }).join('') +
      (filtered.length > displayCount ? '<div class="more-wrap"><button class="more-btn" onclick="loadMore()">さらに表示　残り ' + (filtered.length - displayCount).toLocaleString() + ' 件</button></div>' : '');
    }

    function loadMore() {
      displayCount += 100;
      renderCards(document.getElementById('q').value.toLowerCase().trim());
    }

    loadData();
  </script>
</body>
</html>
